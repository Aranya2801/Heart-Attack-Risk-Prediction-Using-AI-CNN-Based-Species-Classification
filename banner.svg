<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081016"/>
      <stop offset="100%" stop-color="#0E2A22"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E7C61"/>
      <stop offset="100%" stop-color="#3B7DD8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- subtle cell-grid motif (species classification module) -->
  <g opacity="0.12">
    <circle cx="980" cy="70" r="26" fill="none" stroke="#3B7DD8" stroke-width="2"/>
    <circle cx="1040" cy="110" r="18" fill="none" stroke="#3B7DD8" stroke-width="2"/>
    <circle cx="1100" cy="60" r="14" fill="none" stroke="#3B7DD8" stroke-width="2"/>
    <circle cx="1060" cy="200" r="22" fill="none" stroke="#3B7DD8" stroke-width="2"/>
    <circle cx="950" cy="220" r="16" fill="none" stroke="#3B7DD8" stroke-width="2"/>
  </g>

  <!-- ECG pulse line (heart-risk module) -->
  <path d="M 60 180 L 220 180 L 250 120 L 280 230 L 310 60 L 340 180 L 1140 180"
        fill="none" stroke="url(#pulseGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="60" y="110" font-family="Georgia, serif" font-size="46" fill="#EEF3F1" font-weight="700">
    AI Healthcare Platform
  </text>
  <text x="62" y="145" font-family="-apple-system, sans-serif" font-size="18" fill="#9FB0AB">
    Explainable cardiovascular risk prediction &amp; medical image classification
  </text>

  <g font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#5FB89C">
    <text x="62" y="250">ensemble + SHAP</text>
    <text x="220" y="250">·</text>
    <text x="240" y="250">CNN + Grad-CAM</text>
    <text x="420" y="250">·</text>
    <text x="440" y="250">FastAPI</text>
    <text x="540" y="250">·</text>
    <text x="560" y="250">Next.js</text>
    <text x="650" y="250">·</text>
    <text x="670" y="250">Docker</text>
  </g>
</svg>
